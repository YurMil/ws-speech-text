name: Release

# Publishes the transcriber to cadautoscript.com.
#
# Runs automatically on every merge to main that touches the application, and
# can also be driven by an explicit version tag:
#
#   git tag v0.3.0 && git push origin v0.3.0
#
# Either way it builds the bundle, verifies it, attaches a checksummed archive
# to a GitHub release and notifies the host, which republishes the artifact
# behind a pull request. The host never builds this app and never downloads
# model weights.
#
# Merges that only touch documentation or CI do not release — see the paths
# filter. Without it every README fix would run the whole chain and raise
# another pull request on the site.
#
# Required secret: SITE_DISPATCH_TOKEN — a fine-grained PAT scoped to
# YurMil/cadautoscript.com with "Contents: read and write" permission, used
# only to send the repository_dispatch event. Without it the release still
# succeeds and the host sync can be started manually from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'index.html'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'scripts/**'
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and release
        required: true

concurrency:
  # Serialised rather than cancelled: a half-published release is worse than a
  # slow one, and each run uploads its own immutable archive.
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      SITE_REPOSITORY: YurMil/cadautoscript.com
      # Read into env so the notify step can test it — the secrets context is
      # not available in step-level `if` conditions.
      SITE_DISPATCH_TOKEN: ${{ secrets.SITE_DISPATCH_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}
          # The build id comes from `git rev-parse HEAD`, so this must be a real
          # repository rather than an export.
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        # version is taken from "packageManager" in package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Resolve release tag
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.tag }}" ]; then
            # Explicit re-release of an existing tag.
            tag="${{ inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
          else
            # Merge to main. The package version names the release, and the run
            # number keeps each build distinct without writing back to the
            # repository — a version-bump commit would retrigger this workflow.
            version="$(node -p "require('./package.json').version")"
            tag="v${version}-build.${{ github.run_number }}"
          fi
          echo "TAG=${tag}" >> "$GITHUB_ENV"
          echo "Releasing as ${tag}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify the artifact is publishable
        run: pnpm verify

      - name: Package archive
        id: package
        run: |
          set -euo pipefail
          archive="whisper-transcriber-${TAG}.zip"
          # Zip the contents of dist/, not the directory itself: the host sync
          # accepts either layout, and a flat archive is easier to inspect.
          (cd dist && zip -qr "../${archive}" .)
          sha256sum "${archive}" > "${archive}.sha256"
          sha256="$(cut -d' ' -f1 < "${archive}.sha256")"
          {
            echo "archive=${archive}"
            echo "sha256=${sha256}"
          } >> "$GITHUB_OUTPUT"
          echo "Packaged ${archive} ($(stat -c%s "${archive}") bytes), sha256 ${sha256}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE: ${{ steps.package.outputs.archive }}
          SHA256: ${{ steps.package.outputs.sha256 }}
        run: |
          set -euo pipefail
          build_id="$(node -p "require('./dist/build-info.json').buildId")"
          {
            printf 'Static artifact for the CAD AutoScript Whisper Transcriber utility.\n\n'
            printf '| | |\n|---|---|\n'
            printf '| Archive | `%s` |\n' "$ARCHIVE"
            printf '| SHA-256 | `%s` |\n' "$SHA256"
            printf '| Build id | `%s` |\n\n' "$build_id"
            printf 'Published by cadautoscript.com with:\n\n'
            printf '```\nnode scripts/sync-whisper-transcriber.mjs --archive %s --sha256 %s\n```\n' \
              "$ARCHIVE" "$SHA256"
          } > release-notes.md

          # Builds from a merge are marked prerelease so the hand-cut version
          # tags stay easy to find among them.
          prerelease=""
          case "$TAG" in *-build.*) prerelease="--prerelease" ;; esac

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ARCHIVE" "$ARCHIVE.sha256" --clobber
          else
            # --target pins the tag to the commit that was built, not to
            # whatever the default branch points at by the time this runs.
            gh release create "$TAG" "$ARCHIVE" "$ARCHIVE.sha256" \
              --target "$GITHUB_SHA" $prerelease \
              --title "Whisper Transcriber $TAG" --notes-file release-notes.md
          fi

      - name: Notify cadautoscript.com
        if: env.SITE_DISPATCH_TOKEN != ''
        env:
          GH_TOKEN: ${{ env.SITE_DISPATCH_TOKEN }}
          ARCHIVE: ${{ steps.package.outputs.archive }}
          SHA256: ${{ steps.package.outputs.sha256 }}
        run: |
          set -euo pipefail
          jq -n \
            --arg tag "$TAG" \
            --arg archive "$ARCHIVE" \
            --arg sha256 "$SHA256" \
            '{event_type: "whisper-transcriber-release",
              client_payload: {tag: $tag, archive: $archive, sha256: $sha256}}' \
            | gh api "repos/${SITE_REPOSITORY}/dispatches" --input -
          echo "Dispatched whisper-transcriber-release (${TAG}) to ${SITE_REPOSITORY}"

      - name: Summary
        run: |
          {
            echo "### Whisper Transcriber ${TAG}"
            echo
            echo "- archive: \`${{ steps.package.outputs.archive }}\`"
            echo "- sha256: \`${{ steps.package.outputs.sha256 }}\`"
            if [ -z "${SITE_DISPATCH_TOKEN}" ]; then
              echo "- host sync: **not dispatched** (SITE_DISPATCH_TOKEN is not set)"
            else
              echo "- host sync: dispatched to ${SITE_REPOSITORY}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
